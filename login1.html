<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="login1.css">
</head>

<body>
    <div class="container">
        <h3>Login</h3>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Eg., example@gmail.com">
        <label for="password">Password</label>

        <a href="sigup">Sign Up here</a>
    </div>
</body>
